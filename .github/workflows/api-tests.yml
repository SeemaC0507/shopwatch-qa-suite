name: ShopWatch API Tests

on:
  push:
    branches: [master]

jobs:
  test:
   runs-on: ubuntu-latest

   steps:

     - name: Checkout code
       uses: actions/setup-python@v4
       with:
         python-version: "3.11"

     - name: Install dependencies
       run: pip install -r requirements.txt

     - name: Run Tests
       run: pytest tests/ -v           